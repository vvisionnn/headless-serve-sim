name: Publish beta to npm

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - ".github/workflows/publish.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
      - run: bun install

      - name: Client tests
        run: bun run test -- packages/headless-serve-sim-client/src/__tests__/

  publish-beta:
    if: github.repository == 'EvanBacon/serve-sim' && github.ref == 'refs/heads/main'
    needs: [test]
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Detect headless-serve-sim changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "sim=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Publish beta if headless-serve-sim or bundled client source changed.
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          SOURCE_CHANGED=false
          if echo "$CHANGED" | grep -Eq "^packages/(headless-serve-sim|headless-serve-sim-client)/"; then
            SOURCE_CHANGED=true
          fi

          if [ "$SOURCE_CHANGED" = "true" ]; then
            echo "sim=true" >> $GITHUB_OUTPUT
          else
            echo "sim=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup tools (mise)
        if: steps.changes.outputs.sim == 'true'
        uses: jdx/mise-action@v4

      - name: Install dependencies
        if: steps.changes.outputs.sim == 'true'
        run: bun install --frozen-lockfile

      - name: headless-serve-sim hermetic tests
        if: steps.changes.outputs.sim == 'true'
        run: bun run test -- packages/headless-serve-sim/src/__tests__/

      - name: Build and publish headless-serve-sim beta
        if: steps.changes.outputs.sim == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/headless-serve-sim

          # npm auth (previously configured by actions/setup-node registry-url)
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > "$HOME/.npmrc"

          # Publish a unique prerelease from max(local, npm latest) + 1.
          # This keeps automatic main pushes on npm's beta tag until stable
          # promotion is requested explicitly.
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view headless-serve-sim dist-tags.latest 2>/dev/null || echo "")
          [ -z "$PUBLISHED" ] && PUBLISHED="$LOCAL"
          NEW=$(node -e "
            const a='$LOCAL'.split('.').map(Number);
            const b='$PUBLISHED'.split('.').map(Number);
            const max=(a[0]>b[0]||(a[0]===b[0]&&a[1]>b[1])||(a[0]===b[0]&&a[1]===b[1]&&a[2]>b[2]))?a:b;
            max[2]++;
            console.log(max.join('.') + '-beta.${{ github.run_number }}.${{ github.run_attempt }}');
          ")
          echo "Bumped headless-serve-sim: local=$LOCAL npm=$PUBLISHED -> $NEW"
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json'));
            p.version = '$NEW';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

          bun run build:swift
          bun run build

          npm publish --access public --tag beta --provenance
