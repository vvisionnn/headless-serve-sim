name: Publish stable to npm

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install

      - name: Client tests
        run: bun test packages/headless-serve-sim-client/src/__tests__/

  publish-stable:
    if: github.repository == 'EvanBacon/serve-sim' && github.ref == 'refs/heads/main'
    needs: [test]
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Require main branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::Stable publishes must run from main."
            exit 1
          fi

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Boot iOS simulator for headless-serve-sim tests
        id: boot-sim
        run: |
          # Pick the newest available iOS simulator device. The runner image
          # ships pre-created sims - boot one so the headless-serve-sim idle-floor
          # integration test has something real to talk to. Fallback: create
          # one from the latest iOS runtime.
          UDID=$(xcrun simctl list devices available -j | node -e "
            const data = JSON.parse(require('fs').readFileSync(0, 'utf-8'));
            const iosRuntimes = Object.keys(data.devices).filter(r => r.includes('iOS'));
            iosRuntimes.sort().reverse();
            for (const runtime of iosRuntimes) {
              for (const d of data.devices[runtime]) {
                if (d.isAvailable && d.name.includes('iPhone')) {
                  console.log(d.udid);
                  process.exit(0);
                }
              }
            }
          ")
          if [ -z "$UDID" ]; then
            echo "No pre-created iOS simulator found; creating one from the latest runtime"
            RUNTIME=$(xcrun simctl list runtimes -j | node -e "
              const data = JSON.parse(require('fs').readFileSync(0, 'utf-8'));
              const ios = data.runtimes.filter(r => r.isAvailable && r.identifier.includes('iOS'));
              ios.sort((a, b) => a.version.localeCompare(b.version));
              console.log(ios[ios.length - 1].identifier);
            ")
            DEVICETYPE=$(xcrun simctl list devicetypes -j | node -e "
              const data = JSON.parse(require('fs').readFileSync(0, 'utf-8'));
              const iphones = data.devicetypes.filter(d => d.identifier.includes('iPhone'));
              console.log(iphones[iphones.length - 1].identifier);
            ")
            UDID=$(xcrun simctl create "ci-test-iphone" "$DEVICETYPE" "$RUNTIME")
          fi
          echo "Booting simulator $UDID"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          open -ga Simulator || true
          echo "udid=$UDID" >> $GITHUB_OUTPUT

      - name: headless-serve-sim tests (idle floor regression)
        run: bun test packages/headless-serve-sim/src/__tests__/

      - name: Shutdown simulator
        if: always() && steps.boot-sim.outputs.udid != ''
        run: |
          xcrun simctl shutdown "${{ steps.boot-sim.outputs.udid }}" || true

      - name: Build and publish headless-serve-sim stable
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/headless-serve-sim

          # Stable publishing is manual-only. Bump from max(local, npm latest)
          # + 1, publish to npm's latest tag, then commit that stable version.
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view headless-serve-sim dist-tags.latest 2>/dev/null || echo "")
          [ -z "$PUBLISHED" ] && PUBLISHED="$LOCAL"
          NEW=$(node -e "
            const a='$LOCAL'.split('.').map(Number);
            const b='$PUBLISHED'.split('.').map(Number);
            const max=(a[0]>b[0]||(a[0]===b[0]&&a[1]>b[1])||(a[0]===b[0]&&a[1]===b[1]&&a[2]>b[2]))?a:b;
            max[2]++;
            console.log(max.join('.'));
          ")
          echo "Bumped headless-serve-sim stable: local=$LOCAL npm=$PUBLISHED -> $NEW"
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json'));
            p.version = '$NEW';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

          bun run build:swift
          bun run build

          npm publish --access public --tag latest --provenance

      - name: Configure git and commit stable version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/headless-serve-sim/package.json
          if git diff --cached --quiet; then
            echo "No version bump to commit"
          else
            git commit -m "chore: bump headless-serve-sim version [skip ci]"
            for i in 1 2 3; do
              if git push; then exit 0; fi
              echo "Push rejected (attempt $i/3), rebasing on origin/main..."
              git pull --rebase --autostash origin main || break
            done
            echo "::error::Failed to push headless-serve-sim version bump after 3 attempts. npm has been advanced; next run will self-heal."
            exit 1
          fi
