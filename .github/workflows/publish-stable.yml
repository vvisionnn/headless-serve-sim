name: Publish stable to npm

on:
  workflow_dispatch: {}

permissions:
  contents: read

env:
  MISE_LOCKED: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
      - run: bun install --frozen-lockfile
      - run: bun run check:static

      - name: Client tests
        run: bun run test -- packages/headless-serve-sim-client/src/__tests__/

  publish-stable:
    if: github.repository == 'EvanBacon/serve-sim' && github.ref == 'refs/heads/main'
    needs: [test]
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Require main branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::Stable publishes must run from main."
            exit 1
          fi

      - name: Setup tools (mise)
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: headless-serve-sim hermetic tests
        run: bun run test -- packages/headless-serve-sim/src/__tests__/

      - name: Build and publish headless-serve-sim stable
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/headless-serve-sim

          # npm auth (previously configured by actions/setup-node registry-url)
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > "$HOME/.npmrc"

          # Stable publishing is manual-only. Bump from max(local, npm latest)
          # + 1, publish to npm's latest tag, then commit that stable version.
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view headless-serve-sim dist-tags.latest 2>/dev/null || echo "")
          [ -z "$PUBLISHED" ] && PUBLISHED="$LOCAL"
          NEW=$(node -e "
            const a='$LOCAL'.split('.').map(Number);
            const b='$PUBLISHED'.split('.').map(Number);
            const max=(a[0]>b[0]||(a[0]===b[0]&&a[1]>b[1])||(a[0]===b[0]&&a[1]===b[1]&&a[2]>b[2]))?a:b;
            max[2]++;
            console.log(max.join('.'));
          ")
          echo "Bumped headless-serve-sim stable: local=$LOCAL npm=$PUBLISHED -> $NEW"
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json'));
            p.version = '$NEW';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

          bun run build:swift
          bun run build

          bun pm pack --filename headless-serve-sim.tgz
          npm publish headless-serve-sim.tgz --access public --tag latest --provenance

      - name: Configure git and commit stable version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/headless-serve-sim/package.json
          if git diff --cached --quiet; then
            echo "No version bump to commit"
          else
            git commit -m "chore: bump headless-serve-sim version [skip ci]"
            for i in 1 2 3; do
              if git push; then exit 0; fi
              echo "Push rejected (attempt $i/3), rebasing on origin/main..."
              git pull --rebase --autostash origin main || break
            done
            echo "::error::Failed to push headless-serve-sim version bump after 3 attempts. npm has been advanced; next run will self-heal."
            exit 1
          fi
