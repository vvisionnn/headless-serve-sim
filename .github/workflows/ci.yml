name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

env:
  MISE_LOCKED: "1"

# Don't run two macOS builds for the same ref at once (e.g. rapid pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast, cheap checks on Linux — run on every push and PR.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
      - run: bun install --frozen-lockfile
      - run: bun run check:static
      - name: Client unit tests
        run: bun run test -- packages/headless-serve-sim-client/src/__tests__/

  # Full build + hermetic tests on macOS. On a v* tag this also
  # packages the binary and uploads it for the release job.
  build-test:
    runs-on: macos-14 # Apple Silicon (arm64)
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
      - run: bun install --frozen-lockfile

      - name: Build
        run: bun run build.ts
        working-directory: packages/headless-serve-sim

      - name: headless-serve-sim tests
        run: bun run test -- packages/headless-serve-sim/src/__tests__/

      - name: Package release tarball
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: packages/headless-serve-sim/dist
        run: tar -czf headless-serve-sim-darwin-arm64.tar.gz headless-serve-sim simcam simax

      - name: Upload release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: headless-serve-sim-darwin-arm64
          path: packages/headless-serve-sim/dist/headless-serve-sim-darwin-arm64.tar.gz
          if-no-files-found: error

  # Publish only on a v* tag, and only after check + build-test pass.
  release:
    needs: [check, build-test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: headless-serve-sim-darwin-arm64
      - uses: softprops/action-gh-release@v2
        with:
          files: headless-serve-sim-darwin-arm64.tar.gz
          fail_on_unmatched_files: true
